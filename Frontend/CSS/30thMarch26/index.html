<!-- 
Transforms:
tansforms are used to change the element shapa, size and position

transform: functionName()

transform: rotate(degree)
    transform: rotate(120deg)
    transform: rotateX(degree)
    transform: rotateY(degree)

transform: scale(points); to increase the size of the element
    transform: scale(1.7)
    transform: scaleX(1.7)
    transform: scaleY(1.7)

transform: skew(degree); for slant purpose
    transform: skew(120deg)
    transform: skew(degree)
    transform: skew(degree)

transform: translate(px); move element
    transform: translate(px) ; default horizontally
    transform: translateX(px)
    transform: translateY(px)

transform: matrix()
    transform: matrix(scaleX, skewY, skewX, scaleY, translateX, translateY)
    transform: matrix(1, 0.5, 0.5, 1, 100, 100)
-->
